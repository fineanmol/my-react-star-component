name: Release · Publish to npm
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || !startsWith(github.event.head_commit.message, 'chore(release):')

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build library
        run: npm run build:lib

  release:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'workflow_dispatch' || !startsWith(github.event.head_commit.message, 'chore(release):')

    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm install

      - name: Determine version bump
        id: bump
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log "${LAST_TAG}..HEAD" --format="%s")
          else
            COMMITS=$(git log --format="%s")
          fi

          echo "Commits since last tag:"
          echo "$COMMITS"

          BUMP="patch"
          if echo "$COMMITS" | grep -qE "^.+(\(.+\))?!:|BREAKING[- ]CHANGE"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qE "^feat(\([^)]*\))?:"; then
            BUMP="minor"
          fi

          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "Version bump: $BUMP"

      - name: Bump version
        id: version
        run: |
          NEW_VER=$(npm version "${{ steps.bump.outputs.bump }}" --no-git-tag-version)
          echo "new_version=${NEW_VER}" >> "$GITHUB_OUTPUT"
          echo "New version: $NEW_VER"

      - name: Build
        run: npm run build:lib

      - name: Verify npm authentication
        run: |
          set -euo pipefail
          NPM_USER="$(npm whoami)"
          echo "Authenticated as: ${NPM_USER}"
          PKG="$(npm pkg get name | tr -d '"')"
          npm view "$PKG" version || echo "First publish for $PKG"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Check if version already published
        id: version_check
        run: |
          PKG=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          if npm view "${PKG}@${VER}" version 2>/dev/null; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Version ${VER} already on npm — skipping publish."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.version_check.outputs.skip != 'true'
        run: npm publish --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit version bump, tag, and push
        run: |
          git add package.json
          git commit -m "chore(release): ${{ steps.version.outputs.new_version }} [skip ci]"
          git tag "${{ steps.version.outputs.new_version }}"
          git push origin main --follow-tags
