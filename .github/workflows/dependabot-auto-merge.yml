name: Dependabot auto-merge

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.user.login == 'dependabot[bot]') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'pull_request')
    steps:
      - name: Resolve pull request
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            let pr;
            if (context.eventName === 'pull_request') {
              pr = context.payload.pull_request;
            } else {
              const { data: pulls } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                head: `${context.repo.owner}:${context.payload.workflow_run.head_branch}`,
                state: 'open',
              });
              if (!pulls.length) {
                core.info('No open PR for completed CI run — skipping.');
                return;
              }
              pr = pulls[0];
            }
            if (pr.user.login !== 'dependabot[bot]') {
              core.info('Not a Dependabot PR — skipping.');
              return;
            }
            core.setOutput('number', String(pr.number));
            core.setOutput('url', pr.html_url);

      - name: Dependabot metadata
        if: github.event_name == 'pull_request' && steps.pr.outputs.number != ''
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Approve and auto-merge
        if: |
          steps.pr.outputs.number != '' &&
          (github.event_name == 'workflow_run' || steps.metadata.outputs.update-type != 'version-update:semver-major')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ steps.pr.outputs.url }}
        run: |
          gh pr review --approve "$PR_URL" || true
          gh pr merge --auto --squash "$PR_URL"
